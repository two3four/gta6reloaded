<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | GTA6Reloaded</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; }
        .admin-container { max-width: 1000px; margin: 100px auto; padding: 40px; background: #111; border: 1px solid #222; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--primary-red); font-family: var(--font-heading); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 15px; background: #0a0a0a; border: 1px solid #333; color: white; font-family: var(--font-body); }
        .post-list { margin-top: 50px; }
        .post-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .btn-delete { background: #ff2a2a; color: white; border: none; padding: 5px 15px; cursor: pointer; }
        .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-red); padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="editor-header">
            <h1 class="heading-font">Create New Article</h1>
            <a href="../index.html" style="color: var(--text-muted);">View Site</a>
        </div>
        
        <form id="postForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>Article Title</label>
                <input type="text" id="title" name="title" required placeholder="e.g. New Trailer Breakdown">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="category" name="category">
                    <option value="Official">Official</option>
                    <option value="Leaks">Leaks</option>
                    <option value="Trailers">Trailers</option>
                    <option value="Gameplay">Gameplay</option>
                </select>
            </div>
            <div class="form-group">
                <label>Featured Image</label>
                <input type="file" id="image" name="image" accept="image/*" required>
            </div>
            <div class="form-group">
                <label>Content (HTML supported)</label>
                <textarea id="content" name="content" rows="10" required placeholder="Write your article here..."></textarea>
            </div>
            <button type="submit" class="btn">Publish Article</button>
        </form>

        <div class="post-list">
            <h2 class="heading-font">Manage Articles</h2>
            <div id="postsContainer">
                <!-- Posts will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('postForm');
        const postsContainer = document.getElementById('postsContainer');

        // Load posts
        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            postsContainer.innerHTML = posts.map(post => `
                <div class="post-item">
                    <div>
                        <strong>${post.title}</strong> - <span style="color: #666;">${post.date}</span>
                    </div>
                    <button class="btn-delete" onclick="deletePost(${post.id})">Delete</button>
                </div>
            `).join('');
        }

        // Create post
        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            const res = await fetch('/api/posts', {
                method: 'POST',
                body: formData
            });
            
            if (res.ok) {
                alert('Post published!');
                form.reset();
                loadPosts();
            }
        };

        // Delete post
        async function deletePost(id) {
            if (confirm('Are you sure?')) {
                await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                loadPosts();
            }
        }

        loadPosts();
    </script>
</body>
</html>
