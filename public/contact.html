<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | GTA 6 Reloaded</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">GTA6<span>RELOADED</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="news.html">News</a>
                <a href="characters.html">Characters</a>
                <a href="locations.html">Locations</a>
                <a href="livestream.html">Live</a>
                <a href="guides.html">Guides</a>
                <a href="socials.html">Socials</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section style="padding-top: 150px;">
            <h1 class="section-title fade-in">Get In Touch</h1>
            <div class="contact-container fade-in">
                <div class="contact-info">
                    <h2 class="heading-font" style="margin-bottom: 20px;">Contact Details</h2>
                    <p style="color: var(--text-muted); margin-bottom: 30px;">Have a leak to share? Or a business inquiry? Fill out the form or reach us on our socials.</p>
                    
                    <div style="margin-bottom: 20px;">
                        <i class="fas fa-envelope" style="color: var(--primary-red); margin-right: 15px;"></i>
                        <span>admin@gta6reloaded.com</span>
                    </div>
                    
                    <div class="social-top" style="margin-top: 40px; font-size: 2rem;">
                        <a href="https://www.youtube.com/@gta6reloadedlive" target="_blank"><i class="fab fa-youtube"></i></a>
                        <a href="#"><i class="fab fa-tiktok"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="https://web.facebook.com/gta6reloadedlive" target="_blank"><i class="fab fa-facebook"></i></a>
                    </div>
                </div>

                <form class="contact-form" action="https://formspree.io/f/your-id" method="POST">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
