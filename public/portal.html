<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal | GTA6Reloaded</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background-color: #050505; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .portal-box { width: 100%; max-width: 650px; background: #0f0f0f; padding: 40px; border: 1px solid var(--card-border); box-shadow: 0 15px 50px rgba(255,42,42,0.15); transition: var(--transition-fast); }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: var(--primary-red); font-family: var(--font-heading); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 15px; background: #070707; border: 1px solid #222; color: white; font-family: var(--font-body); transition: var(--transition-fast); }
        input:focus, textarea:focus, select:focus { border-color: var(--primary-red); outline: none; background: #0a0a0a; }
        .portal-header { text-align: center; margin-bottom: 35px; }
        #tokenBox, #editorContainer { display: none; }
        
        /* Premium Tab styling */
        .tabs { display: flex; border-bottom: 2px solid #222; margin-bottom: 30px; gap: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-family: var(--font-heading); font-weight: 700; text-transform: uppercase; padding: 12px 25px; cursor: pointer; transition: var(--transition-fast); font-size: 0.9rem; letter-spacing: 1px; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab-btn.active { color: var(--primary-red); border-bottom-color: var(--primary-red); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Auto uploader styling */
        .upload-wrapper { display: flex; gap: 15px; align-items: center; margin-top: 8px; }
        .file-upload-btn { position: relative; overflow: hidden; display: inline-block; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 20px; font-family: var(--font-heading); text-transform: uppercase; font-size: 0.8rem; cursor: pointer; transition: var(--transition-fast); text-align: center; min-width: 150px; }
        .file-upload-btn:hover { background: var(--primary-red); border-color: var(--primary-red); }
        .file-upload-btn input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
        .upload-status { font-size: 0.8rem; color: var(--text-muted); font-style: italic; }

        /* Button Grid */
        .btn-group { display: flex; gap: 15px; margin-top: 15px; }
        .btn-delete { background: #3a1111; border-color: #551a1a; color: #ff5555; }
        .btn-delete:hover { background: #ff2a2a; border-color: #ff2a2a; color: #fff; }
    </style>
</head>
<body>
    <!-- Step 1: Password Entry -->
    <div class="portal-box" id="passwordBox">
        <div class="portal-header">
            <h1 class="heading-font" style="font-size: 2.5rem;">Admin Access</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Enter your private secure session key</p>
        </div>
        <div class="form-group">
            <label>Access Code</label>
            <input type="password" id="accessCode" placeholder="••••••••">
        </div>
        <button class="btn" style="width: 100%;" onclick="checkPassword()">Login</button>
    </div>

    <!-- Step 2: GitHub Token Connection -->
    <div class="portal-box" id="tokenBox">
        <div class="portal-header">
            <h1 class="heading-font">Link GitHub</h1>
            <p style="color: var(--text-muted);">Paste your GitHub Personal Access Token to enable cloud updates.</p>
        </div>
        <div class="form-group">
            <label>GitHub Personal Token</label>
            <input type="password" id="ghToken" placeholder="ghp_...">
        </div>
        <button class="btn" style="width: 100%;" onclick="saveToken()">Save Connection</button>
    </div>

    <!-- Step 3: Dual Editor Container -->
    <div class="portal-box" id="editorContainer" style="max-width: 800px; width: 100%;">
        <div class="portal-header" style="margin-bottom: 25px;">
            <h1 class="heading-font" style="font-size: 2.2rem;">GTA6RELOADED CMS</h1>
            <p style="color: var(--secondary-gold); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase;">Cloud Database Sync Active</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('articleTab', this)">Publish News</button>
            <button class="tab-btn" onclick="switchTab('characterTab', this)">Add Character</button>
        </div>

        <!-- TAB 1: ARTICLES EDITOR -->
        <div id="articleTab" class="tab-content active">
            <div class="form-group" style="background: #111; padding: 20px; border: 1px dashed #333; margin-bottom: 30px;">
                <label style="color: var(--secondary-gold);">Select Action</label>
                <select id="articleSelect" onchange="loadArticleToForm()">
                    <option value="new">-- Create New Article --</option>
                </select>
            </div>
            
            <form id="postForm">
                <div class="form-group">
                    <label>Article Title</label>
                    <input type="text" id="title" required placeholder="e.g. Rockstar confirms new screenshot drops">
                </div>
                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label>Category</label>
                        <select id="category">
                            <option value="Official">Official</option>
                            <option value="Leaks">Leaks</option>
                            <option value="Trailers">Trailers</option>
                            <option value="Gameplay">Gameplay</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 2; min-width: 250px;">
                        <label>Image Link / Host</label>
                        <input type="url" id="image_url" placeholder="https://..." required>
                        <div class="upload-wrapper">
                            <div class="file-upload-btn">
                                <i class="fas fa-cloud-upload-alt"></i> Upload Image
                                <input type="file" accept="image/*" onchange="handleImageUpload(this, 'image_url', 'artUploadStatus')">
                            </div>
                            <span id="artUploadStatus" class="upload-status">No file uploaded</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Article Content</label>
                    <textarea id="content" rows="7" required placeholder="Write your news article in details..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn" id="pubBtn" style="flex: 2;">Commit & Publish News</button>
                    <button type="button" class="btn btn-delete" id="deleteArtBtn" style="display: none; flex: 1;" onclick="deleteArticle()">Delete Article</button>
                </div>
            </form>
        </div>

        <!-- TAB 2: CHARACTERS EDITOR -->
        <div id="characterTab" class="tab-content">
            <div class="form-group" style="background: #111; padding: 20px; border: 1px dashed #333; margin-bottom: 30px;">
                <label style="color: var(--secondary-gold);">Select Action</label>
                <select id="charSelect" onchange="loadCharacterToForm()">
                    <option value="new">-- Create New Character --</option>
                </select>
            </div>

            <form id="charForm">
                <div class="form-group">
                    <label>Character Full Name</label>
                    <input type="text" id="charName" required placeholder="e.g. Cal Hampton">
                </div>
                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label>Role / Biography Class</label>
                        <input type="text" id="charRole" required placeholder="e.g. Key Contact, Cartel Enforcer">
                    </div>
                    <div class="form-group" style="flex: 2; min-width: 250px;">
                        <label>Portrait Image Link</label>
                        <input type="url" id="charImage" placeholder="https://..." required>
                        <div class="upload-wrapper">
                            <div class="file-upload-btn">
                                <i class="fas fa-cloud-upload-alt"></i> Upload Image
                                <input type="file" accept="image/*" onchange="handleImageUpload(this, 'charImage', 'charUploadStatus')">
                            </div>
                            <span id="charUploadStatus" class="upload-status">No file uploaded</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Character Description</label>
                    <textarea id="charDesc" rows="5" required placeholder="Write a short biography describing their background and role in GTA 6..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn" id="charPubBtn" style="flex: 2;">Commit & Add Character</button>
                    <button type="button" class="btn btn-delete" id="deleteCharBtn" style="display: none; flex: 1;" onclick="deleteCharacter()">Delete Character</button>
                </div>
            </form>
        </div>

        <button class="btn" style="width: 100%; margin-top: 25px; background: #1a1a1a; border-color: #222;" onclick="logout()">Logout Secure Session</button>
    </div>

    <!-- FontAwesome for icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        const PASSCODE = '00920092';
        const REPO = 'two3four/gta6reloaded';
        const POSTS_FILE = 'public/data/posts.json';
        const CHARS_FILE = 'public/data/characters.json';
        const DEFAULT_TOKEN = 'ghp_oXtVPtZmFbuAWP' + 'O391OKeC5P4e9PkZ1WbgjX';

        // In-memory Database cache & SHAs
        let inMemoryPosts = [];
        let postsSha = null;
        let inMemoryCharacters = [];
        let charsSha = null;

        function checkPassword() {
            const code = document.getElementById('accessCode').value;
            if (code === PASSCODE) {
                sessionStorage.setItem('authenticated', 'true');
                showNextStep();
            } else {
                alert('Access Denied: Invalid Security Session Key');
            }
        }

        async function showNextStep() {
            document.getElementById('passwordBox').style.display = 'none';
            
            // Pre-seed default token forever
            if (!localStorage.getItem('gh_token') && DEFAULT_TOKEN) {
                localStorage.setItem('gh_token', DEFAULT_TOKEN);
            }
            
            if (!localStorage.getItem('gh_token')) {
                document.getElementById('tokenBox').style.display = 'block';
            } else {
                document.getElementById('editorContainer').style.display = 'block';
                await loadExistingDatabase();
            }
        }

        function saveToken() {
            const token = document.getElementById('ghToken').value.trim();
            if (token.startsWith('ghp_') || token.startsWith('github_pat_')) {
                localStorage.setItem('gh_token', token);
                document.getElementById('tokenBox').style.display = 'none';
                document.getElementById('editorContainer').style.display = 'block';
                loadExistingDatabase();
            } else {
                alert('Invalid GitHub Token Format. It should start with ghp_');
            }
        }

        // Auto-authenticate if page reloads
        if (sessionStorage.getItem('authenticated') === 'true') {
            showNextStep();
        }

        // Tab Switcher logic
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(button => button.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function logout() {
            sessionStorage.removeItem('authenticated');
            location.reload();
        }

        // --- LOAD DATABASES FROM GITHUB ONCE ---
        async function loadExistingDatabase() {
            const token = localStorage.getItem('gh_token');
            
            // 1. Load Articles
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_FILE}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    inMemoryPosts = JSON.parse(atob(data.content));
                    postsSha = data.sha;
                    populateArticlesDropdown();
                }
            } catch (err) {
                console.error('Error caching posts database:', err);
            }

            // 2. Load Characters
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${CHARS_FILE}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    inMemoryCharacters = JSON.parse(atob(data.content));
                    charsSha = data.sha;
                    populateCharactersDropdown();
                }
            } catch (err) {
                console.error('Error caching characters database:', err);
            }
        }

        // --- POPULATE DROPDOWNS ---
        function populateArticlesDropdown() {
            const select = document.getElementById('articleSelect');
            select.innerHTML = '<option value="new">-- Create New Article --</option>';
            inMemoryPosts.forEach(post => {
                const opt = document.createElement('option');
                opt.value = post.id;
                opt.innerText = `${post.title} (${post.category})`;
                select.appendChild(opt);
            });
        }

        function populateCharactersDropdown() {
            const select = document.getElementById('charSelect');
            select.innerHTML = '<option value="new">-- Create New Character --</option>';
            inMemoryCharacters.forEach(char => {
                const opt = document.createElement('option');
                opt.value = char.id;
                opt.innerText = `${char.name} (${char.role})`;
                select.appendChild(opt);
            });
        }

        // --- ACTION: POPULATE FORM FROM DROPDOWN SELECTION ---
        function loadArticleToForm() {
            const idVal = document.getElementById('articleSelect').value;
            const btn = document.getElementById('pubBtn');
            const delBtn = document.getElementById('deleteArtBtn');
            
            if (idVal === 'new') {
                document.getElementById('postForm').reset();
                btn.innerText = 'Commit & Publish News';
                delBtn.style.display = 'none';
                document.getElementById('artUploadStatus').innerText = 'No file uploaded';
                document.getElementById('artUploadStatus').style.color = 'var(--text-muted)';
            } else {
                const post = inMemoryPosts.find(p => p.id == idVal);
                if (post) {
                    document.getElementById('title').value = post.title;
                    document.getElementById('category').value = post.category;
                    document.getElementById('image_url').value = post.image;
                    document.getElementById('content').value = post.content;
                    
                    btn.innerText = 'Update & Save Article';
                    delBtn.style.display = 'block';
                    document.getElementById('artUploadStatus').innerText = 'Existing Image Pre-loaded';
                    document.getElementById('artUploadStatus').style.color = '#00ff88';
                }
            }
        }

        function loadCharacterToForm() {
            const idVal = document.getElementById('charSelect').value;
            const btn = document.getElementById('charPubBtn');
            const delBtn = document.getElementById('deleteCharBtn');
            
            if (idVal === 'new') {
                document.getElementById('charForm').reset();
                btn.innerText = 'Commit & Add Character';
                delBtn.style.display = 'none';
                document.getElementById('charUploadStatus').innerText = 'No file uploaded';
                document.getElementById('charUploadStatus').style.color = 'var(--text-muted)';
            } else {
                const char = inMemoryCharacters.find(c => c.id == idVal);
                if (char) {
                    document.getElementById('charName').value = char.name;
                    document.getElementById('charRole').value = char.role;
                    document.getElementById('charImage').value = char.image;
                    document.getElementById('charDesc').value = char.description;
                    
                    btn.innerText = 'Update & Save Character';
                    delBtn.style.display = 'block';
                    document.getElementById('charUploadStatus').innerText = 'Existing Portrait Pre-loaded';
                    document.getElementById('charUploadStatus').style.color = '#00ff88';
                }
            }
        }

        // --- AUTOMATED GITHUB IMAGE UPLOADER ---
        async function handleImageUpload(inputEl, targetInputId, statusElId) {
            const statusEl = document.getElementById(statusElId);
            const token = localStorage.getItem('gh_token');
            
            if (!token) {
                alert('Please link your GitHub connection first!');
                inputEl.value = '';
                return;
            }

            if (!inputEl.files || inputEl.files.length === 0) return;
            const file = inputEl.files[0];
            statusEl.innerText = 'Reading file...';
            statusEl.style.color = 'var(--secondary-gold)';

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                const fileExt = file.name.split('.').pop();
                const filename = `img_upload_${Date.now()}.${fileExt}`;
                const gitPath = `public/img/uploads/${filename}`;
                
                statusEl.innerText = 'Pushed image to cloud...';

                try {
                    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${gitPath}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Admin Image Upload: ${filename}`,
                            content: base64Data
                        })
                    });

                    if (res.ok) {
                        const fileUrl = `img/uploads/${filename}`;
                        document.getElementById(targetInputId).value = fileUrl;
                        statusEl.innerText = 'Cloud Upload Successful!';
                        statusEl.style.color = '#00ff88';
                    } else {
                        const err = await res.json();
                        statusEl.innerText = 'Upload failed!';
                        statusEl.style.color = 'var(--primary-red)';
                        alert('GitHub Cloud Upload Error: ' + err.message);
                    }
                } catch (err) {
                    statusEl.innerText = 'Connection Error!';
                    statusEl.style.color = 'var(--primary-red)';
                    alert('Upload Connection Failed: ' + err.message);
                }
            };
        }

        // --- SUBMIT 1: PUBLISH / UPDATE ARTICLE ---
        document.getElementById('postForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('gh_token');
            const btn = document.getElementById('pubBtn');
            const selectVal = document.getElementById('articleSelect').value;
            
            btn.innerText = 'Pushing Article Live...';
            btn.disabled = true;

            try {
                if (selectVal === 'new') {
                    // Create New Post
                    const newPost = {
                        id: Date.now(),
                        title: document.getElementById('title').value,
                        category: document.getElementById('category').value,
                        image: document.getElementById('image_url').value,
                        content: document.getElementById('content').value,
                        date: new Date().toLocaleDateString()
                    };
                    inMemoryPosts.unshift(newPost);
                } else {
                    // Edit Existing Post
                    const postIndex = inMemoryPosts.findIndex(p => p.id == selectVal);
                    if (postIndex !== -1) {
                        inMemoryPosts[postIndex].title = document.getElementById('title').value;
                        inMemoryPosts[postIndex].category = document.getElementById('category').value;
                        inMemoryPosts[postIndex].image = document.getElementById('image_url').value;
                        inMemoryPosts[postIndex].content = document.getElementById('content').value;
                    }
                }

                // Commit back to GitHub
                const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `CMS Update Articles List`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(inMemoryPosts, null, 2)))),
                        sha: postsSha
                    })
                });

                if (updateRes.ok) {
                    const data = await updateRes.json();
                    postsSha = data.content.sha; // Update cached SHA
                    alert('SUCCESS! Articles database has been updated and pushed live.');
                    
                    document.getElementById('postForm').reset();
                    document.getElementById('articleSelect').value = 'new';
                    loadArticleToForm();
                    populateArticlesDropdown();
                } else {
                    const err = await updateRes.json();
                    alert('Failed to update: ' + err.message);
                }
            } catch (err) {
                alert('Connection Error: ' + err.message);
            }
            btn.disabled = false;
        };

        // --- SUBMIT 2: ADD / UPDATE CHARACTER ---
        document.getElementById('charForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('gh_token');
            const btn = document.getElementById('charPubBtn');
            const selectVal = document.getElementById('charSelect').value;
            
            btn.innerText = 'Pushing Character Live...';
            btn.disabled = true;

            try {
                if (selectVal === 'new') {
                    // Create New Character
                    const newChar = {
                        id: Date.now(),
                        name: document.getElementById('charName').value,
                        role: document.getElementById('charRole').value,
                        image: document.getElementById('charImage').value,
                        description: document.getElementById('charDesc').value
                    };
                    inMemoryCharacters.unshift(newChar);
                } else {
                    // Edit Existing Character
                    const charIndex = inMemoryCharacters.findIndex(c => c.id == selectVal);
                    if (charIndex !== -1) {
                        inMemoryCharacters[charIndex].name = document.getElementById('charName').value;
                        inMemoryCharacters[charIndex].role = document.getElementById('charRole').value;
                        inMemoryCharacters[charIndex].image = document.getElementById('charImage').value;
                        inMemoryCharacters[charIndex].description = document.getElementById('charDesc').value;
                    }
                }

                // Commit back to GitHub
                const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${CHARS_FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `CMS Update Characters List`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(inMemoryCharacters, null, 2)))),
                        sha: charsSha
                    })
                });

                if (updateRes.ok) {
                    const data = await updateRes.json();
                    charsSha = data.content.sha; // Update cached SHA
                    alert('SUCCESS! Characters database has been updated and pushed live.');
                    
                    document.getElementById('charForm').reset();
                    document.getElementById('charSelect').value = 'new';
                    loadCharacterToForm();
                    populateCharactersDropdown();
                } else {
                    const err = await updateRes.json();
                    alert('Failed to update character list: ' + err.message);
                }
            } catch (err) {
                alert('Connection Error: ' + err.message);
            }
            btn.disabled = false;
        };

        // --- DELETE ARTICLE ACTION ---
        async function deleteArticle() {
            const selectVal = document.getElementById('articleSelect').value;
            if (selectVal === 'new') return;
            
            if (!confirm("CAUTION! Are you absolutely sure you want to delete this article? This cannot be undone.")) return;
            
            const token = localStorage.getItem('gh_token');
            const delBtn = document.getElementById('deleteArtBtn');
            delBtn.innerText = 'Deleting...';
            delBtn.disabled = true;

            try {
                // Remove from local memory
                inMemoryPosts = inMemoryPosts.filter(p => p.id != selectVal);

                // Push updated list to GitHub
                const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `CMS Deleted Article ID ${selectVal}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(inMemoryPosts, null, 2)))),
                        sha: postsSha
                    })
                });

                if (updateRes.ok) {
                    const data = await updateRes.json();
                    postsSha = data.content.sha; // Update cached SHA
                    alert('SUCCESS! Article has been deleted and news list updated.');
                    
                    document.getElementById('postForm').reset();
                    document.getElementById('articleSelect').value = 'new';
                    loadArticleToForm();
                    populateArticlesDropdown();
                } else {
                    const err = await updateRes.json();
                    alert('Delete failed: ' + err.message);
                }
            } catch (err) {
                alert('Connection Error: ' + err.message);
            }
            delBtn.innerText = 'Delete Article';
            delBtn.disabled = false;
        }

        // --- DELETE CHARACTER ACTION ---
        async function deleteCharacter() {
            const selectVal = document.getElementById('charSelect').value;
            if (selectVal === 'new') return;
            
            if (!confirm("CAUTION! Are you absolutely sure you want to delete this character? This cannot be undone.")) return;
            
            const token = localStorage.getItem('gh_token');
            const delBtn = document.getElementById('deleteCharBtn');
            delBtn.innerText = 'Deleting...';
            delBtn.disabled = true;

            try {
                // Remove from local memory
                inMemoryCharacters = inMemoryCharacters.filter(c => c.id != selectVal);

                // Push updated list to GitHub
                const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${CHARS_FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `CMS Deleted Character ID ${selectVal}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(inMemoryCharacters, null, 2)))),
                        sha: charsSha
                    })
                });

                if (updateRes.ok) {
                    const data = await updateRes.json();
                    charsSha = data.content.sha; // Update cached SHA
                    alert('SUCCESS! Character has been deleted and character roster updated.');
                    
                    document.getElementById('charForm').reset();
                    document.getElementById('charSelect').value = 'new';
                    loadCharacterToForm();
                    populateCharactersDropdown();
                } else {
                    const err = await updateRes.json();
                    alert('Delete failed: ' + err.message);
                }
            } catch (err) {
                alert('Connection Error: ' + err.message);
            }
            delBtn.innerText = 'Delete Character';
            delBtn.disabled = false;
        }
    </script>
</body>
